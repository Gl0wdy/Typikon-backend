# docker-compose.yml (в корне репозитория)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: typikon
      POSTGRES_PASSWORD: typikon
      POSTGRES_DB: wiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: