services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: typikon
      POSTGRES_PASSWORD: typikon
      POSTGRES_DB: wiki
    volumes:
      - pgdata:/var/lib/postgresql/data

  wiki-service:
    build:
      context: .
      dockerfile: microservices/wiki-service/Dockerfile
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: typikon
      DB_PASSWORD: typikon
      DB_NAME: wiki
    ports:
      - "8080:8080"  
      - "50051:50051"

  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #   depends_on:
  #     - wiki-service

volumes:
  pgdata:
  caddy_data: